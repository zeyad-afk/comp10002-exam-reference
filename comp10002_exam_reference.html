const state = { activeTab: "hash", expanded: {} };

function render() {
  const app = document.getElementById("app");
  const tabs = Object.keys(DATA);

  let tabsHtml = tabs.map(key => {
    const isActive = key === state.activeTab;
    return `<button data-tab="${key}" style="
      display:flex; align-items:center; gap:6px;
      padding:8px 14px; font-size:13px; font-weight:500;
      border:0.5px solid ${isActive ? 'var(--color-border-info)' : 'var(--color-border-tertiary)'};
      background:${isActive ? 'var(--color-background-info)' : 'var(--color-background-primary)'};
      color:${isActive ? 'var(--color-text-info)' : 'var(--color-text-secondary)'};
      border-radius:var(--border-radius-md); cursor:pointer; white-space:nowrap;
    "><i class="ti ${DATA[key].icon}" style="font-size:15px" aria-hidden="true"></i>${DATA[key].label}</button>`;
  }).join("");

  const activeItems = DATA[state.activeTab].items;
  let itemsHtml = activeItems.map((item, idx) => {
    const key = state.activeTab + "_" + idx;
    const isOpen = !!state.expanded[key];
    return `
    <div style="border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); margin-bottom:10px; overflow:hidden;">
      <button data-toggle="${key}" style="
        width:100%; display:flex; align-items:center; justify-content:space-between;
        padding:12px 16px; background:var(--color-background-primary); border:none;
        cursor:pointer; text-align:left;
      ">
        <span style="font-size:14px; font-weight:500; font-family:var(--font-mono); color:var(--color-text-primary);">${item.name}</span>
        <i class="ti ${isOpen ? 'ti-chevron-up' : 'ti-chevron-down'}" style="font-size:16px; color:var(--color-text-tertiary);" aria-hidden="true"></i>
      </button>
      ${isOpen ? `
      <div style="padding:0 16px 16px; border-top:0.5px solid var(--color-border-tertiary);">
        <div style="margin-top:12px;">
          <p style="font-size:11px; font-weight:500; color:var(--color-text-tertiary); margin:0 0 4px; text-transform:uppercase; letter-spacing:0.03em;">When you'd need it</p>
          <p style="font-size:13px; color:var(--color-text-secondary); margin:0 0 14px; line-height:1.6;">${item.when}</p>
        </div>
        <div style="margin-bottom:14px;">
          <p style="font-size:11px; font-weight:500; color:var(--color-text-tertiary); margin:0 0 4px; text-transform:uppercase; letter-spacing:0.03em;">Logic</p>
          <p style="font-size:13px; color:var(--color-text-secondary); margin:0; line-height:1.7; white-space:pre-line;">${item.logic}</p>
        </div>
        <div style="margin-bottom:14px;">
          <p style="font-size:11px; font-weight:500; color:var(--color-text-tertiary); margin:0 0 4px; text-transform:uppercase; letter-spacing:0.03em;">Why it works</p>
          <p style="font-size:13px; color:var(--color-text-secondary); margin:0; line-height:1.7;">${item.why}</p>
        </div>
        <div style="margin-bottom:14px; padding:10px 12px; background:var(--color-background-secondary); border-radius:var(--border-radius-md);">
          <p style="font-size:11px; font-weight:500; color:var(--color-text-tertiary); margin:0 0 4px; text-transform:uppercase; letter-spacing:0.03em;">Exam memory trigger</p>
          <p style="font-size:13px; color:var(--color-text-primary); margin:0; line-height:1.6; font-weight:500;">${item.trigger}</p>
        </div>
        <div>
          <p style="font-size:11px; font-weight:500; color:var(--color-text-tertiary); margin:0 0 6px; text-transform:uppercase; letter-spacing:0.03em;">Code</p>

      </div>` : ''}
    </div>`;
  }).join("");

render();
